<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Page</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<canvas id="confetti"></canvas>
<div id="sparkles"></div>

<header>
<h2 class="logo">For You</h2>
</header>

<section class="hero reveal">

<img src="bunga.png.png" class="decor bunga float">
<img src="cangkir.png.png" class="decor cangkir float">

<div class="hero-gallery">

<img src="foto_hero1.png.png" class="hero-photo frame1">
<img src="foto_hero2.png.png" class="hero-photo frame2">
<img src="foto_hero3.png.png" class="hero-photo frame3">

</div>

<h1 class="glow">Happy Birthday, Jeli</h1>

<p>A small website made just for you</p>

<button id="openMessage">Open Your Gift</button>

</section>

<section class="memories reveal">

<h2>Birthday Girl</h2>

<div class="carousel">

<button class="nav prev">&#10094;</button>

<div class="carousel-track">

<img src="foto1.png.png" class="memory-photo active">
<img src="foto2.png.png" class="memory-photo">
<img src="foto3.png.png" class="memory-photo">

</div>

<button class="nav next">&#10095;</button>

</div>

</section>

<section class="message reveal">

<h2>A Message For You</h2>

<p id="typing"></p>

</section>

<section class="closing reveal">

<img src="kue.png.png" class="cake float">

<h2>Once Again</h2>
<h1 class="glow">Happy Birthday</h1>

<p>You deserve a day filled with happiness and love.</p>

</section>

<footer>

<img src="pita.png.png" class="ribbon float">

<p>Made with care</p>

</footer>

<script src="script.js"></script>

</body>
</html>
